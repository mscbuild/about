<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Angry Birds HTML5</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e94560">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0f3460;
  font-family: sans-serif;
}

canvas {
  display: block;
  touch-action: none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script src="main.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
  <script>const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;

  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize);
resize();

let GROUND, SLING_X, SLING_Y;

function layout() {
  GROUND = H - 80;
  SLING_X = W * 0.2;
  SLING_Y = GROUND - 100;
}
layout();

const GRAVITY = 0.4;

let bird = {
  x: SLING_X,
  y: SLING_Y,
  vx: 0,
  vy: 0,
  r: 20,
  launched: false
};

let pigs = [
  {x: W*0.7, y: GROUND-20, r:20, alive:true}
];

let isDrag = false;
let drag = {x:0,y:0};

// звук
const snd = {
  shoot: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-arrow-shot-1464.mp3'),
  hit: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-wood-hit-2019.mp3'),
};

function play(s){
  snd[s].currentTime=0;
  snd[s].play().catch(()=>{});
}

// вибрация
function vib(ms=20){
  navigator.vibrate && navigator.vibrate(ms);
}

// цикл
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

function update(){
  if(bird.launched){
    bird.vy += GRAVITY;
    bird.x += bird.vx;
    bird.y += bird.vy;

    if(bird.y > GROUND - bird.r){
      bird.y = GROUND - bird.r;
      bird.vy *= -0.4;
    }

    pigs.forEach(p=>{
      if(!p.alive) return;
      let dx = bird.x - p.x;
      let dy = bird.y - p.y;
      if(Math.hypot(dx,dy) < bird.r + p.r){
        p.alive = false;
        play('hit');
        vib(40);
      }
    });
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.fillStyle="#3d7a34";
  ctx.fillRect(0,GROUND,W,H);

  // sling
  ctx.fillStyle="#5D3A1A";
  ctx.fillRect(SLING_X-10, SLING_Y-50,20,60);

  // bird
  ctx.beginPath();
  ctx.fillStyle="#e94560";
  ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);
  ctx.fill();

  // pigs
  pigs.forEach(p=>{
    if(!p.alive) return;
    ctx.beginPath();
    ctx.fillStyle="green";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  // trajectory
  if(isDrag){
    let dx = SLING_X - drag.x;
    let dy = SLING_Y - drag.y;

    let vx = dx*0.2;
    let vy = dy*0.2;

    let px = bird.x;
    let py = bird.y;

    ctx.fillStyle="white";

    for(let i=0;i<20;i++){
      vy+=GRAVITY;
      px+=vx;
      py+=vy;
      ctx.beginPath();
      ctx.arc(px,py,3,0,Math.PI*2);
      ctx.fill();
    }
  }
}

// touch
function getPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0]||e.changedTouches[0];
  return {
    x:(t.clientX-r.left)*(canvas.width/r.width)/(window.devicePixelRatio||1),
    y:(t.clientY-r.top)*(canvas.height/r.height)/(window.devicePixelRatio||1)
  };
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const p=getPos(e);
  if(Math.hypot(p.x-bird.x,p.y-bird.y)<60){
    isDrag=true;
    drag=p;
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!isDrag) return;

  const p=getPos(e);

  let dx=p.x-SLING_X;
  let dy=p.y-SLING_Y;

  const max=100;
  const d=Math.hypot(dx,dy);

  if(d>max){
    dx=dx/d*max;
    dy=dy/d*max;
  }

  drag.x=SLING_X+dx;
  drag.y=SLING_Y+dy;

  bird.x=drag.x;
  bird.y=drag.y;
},{passive:false});

canvas.addEventListener('touchend',()=>{
  if(!isDrag) return;
  isDrag=false;

  let dx=SLING_X-drag.x;
  let dy=SLING_Y-drag.y;

  let p=Math.min(Math.hypot(dx,dy)*0.2,25);
  let a=Math.atan2(dy,dx);

  bird.vx=Math.cos(a)*p;
  bird.vy=Math.sin(a)*p;
  bird.launched=true;

  play('shoot');
  vib(20);
});
</script>

</body>
</html>
